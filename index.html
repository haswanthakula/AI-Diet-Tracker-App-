<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haswanth's AI Diet Tracker</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDNs for browser-side JSX -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin 2s linear infinite; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>

    <!-- Using ES Modules for Firebase in HTML -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global definitions for the Babel script to use
        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, serverTimestamp };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- USER: REPLACE THESE WITH YOUR OWN FIREBASE & GEMINI KEYS FOR GITHUB ---
        const apiKey = ""; 
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
          apiKey: "YOUR_FIREBASE_API_KEY",
          authDomain: "YOUR_PROJECT.firebaseapp.com",
          projectId: "YOUR_PROJECT_ID",
          storageBucket: "YOUR_PROJECT.appspot.com",
          messagingSenderId: "YOUR_SENDER_ID",
          appId: "YOUR_APP_ID"
        };
        // --------------------------------------------------------------------------

        const GOALS = { calories: 1650, protein: 130, carbs: 150, fats: 55, fiber: 25 };
        const CATEGORIES = [
            { id: 'pre-workout', name: 'Pre-Workout', icon: 'zap' },
            { id: 'post-workout', name: 'Post-Workout', icon: 'dumbbell' },
            { id: 'lunch', name: 'Lunch', icon: 'utensils' },
            { id: 'snack', name: 'Snack', icon: 'activity' },
            { id: 'dinner', name: 'Dinner', icon: 'flame' },
        ];

        // Custom Icon component using Inline SVGs to avoid DOM manipulation errors (removeChild)
        const Icon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                flame: <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.236 1.1-3.17C6.027 12.21 7 13.23 8.5 14.5z"/>,
                zap: <path d="M13 2 L3 14 L12 14 L11 22 L21 10 L12 10 L13 2z"/>,
                dumbbell: <path d="m6.5 6.5 11 11M6.74 7.46a1 1 0 1 0-1.42-1.42L3.84 7.52a1 1 0 1 0 1.42 1.42zM21.59 16.41a1 1 0 1 0-1.42-1.42l-1.48 1.48a1 1 0 1 0 1.42 1.42zM3.4 10.7a2 2 0 1 0 2.8 2.8l2.8-2.8a2 2 0 1 0-2.8-2.8zM15 17.7a2 2 0 1 0 2.8 2.8l2.8-2.8a2 2 0 1 0-2.8-2.8z"/>,
                utensils: <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2M7 2v4M11 2v4M15 2v4M19 2v10c0 1.1-.9 2-2 2h-4a2 2 0 0 0-2-2V2M15 2v4M11 2v4"/>,
                activity: <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>,
                'loader-2': <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>,
                'chevron-right': <path d="m9 18 6-6-6-6"/>,
                'trash-2': <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/>,
                'pie-chart': <path d="M21.21 15.89A10 10 0 1 1 8 2.83M22 12A10 10 0 0 0 12 2v10z"/>,
                history: <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8M3 3v5h5"/>
            };

            return (
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={`${className} ${name === 'loader-2' ? 'animate-spin' : ''}`}
                >
                    {icons[name] || null}
                </svg>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [meals, setMeals] = useState([]);
            const [input, setInput] = useState("");
            const [selectedCategory, setSelectedCategory] = useState('lunch');
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [isSyncing, setIsSyncing] = useState(true);

            // Initialize Firebase services
            const app = FB.initializeApp(firebaseConfig);
            const auth = FB.getAuth(app);
            const db = FB.getFirestore(app);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'haswanth-diet-tracker';

            useEffect(() => {
                const initAuth = async () => {
                    await FB.signInAnonymously(auth);
                };
                initAuth();
                const unsubscribe = FB.onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                setIsSyncing(true);
                const path = `artifacts/${appId}/users/${user.uid}/meals`;
                const mealsCollection = FB.collection(db, ...path.split('/'));
                
                const unsubscribe = FB.onSnapshot(mealsCollection, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setMeals(data.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                    setIsSyncing(false);
                }, (err) => {
                    console.error("Firestore sync error:", err);
                    setIsSyncing(false);
                });
                return () => unsubscribe();
            }, [user]);

            const totals = useMemo(() => {
                return meals.reduce((acc, meal) => ({
                    calories: acc.calories + (Number(meal.calories) || 0),
                    protein: acc.protein + (Number(meal.protein) || 0),
                }), { calories: 0, protein: 0 });
            }, [meals]);

            const analyze = async () => {
                if (!input.trim() || !user) return;
                setIsAnalyzing(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: input }] }],
                            systemInstruction: { parts: [{ text: 'Analyze food, return JSON: itemName, calories, protein, carbs, fats, fiber. Ensure all macro values are numbers.' }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const result = await response.json();
                    const data = JSON.parse(result.candidates[0].content.parts[0].text);
                    
                    const path = `artifacts/${appId}/users/${user.uid}/meals`;
                    await FB.addDoc(FB.collection(db, ...path.split('/')), {
                        ...data,
                        category: selectedCategory,
                        timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                        createdAt: FB.serverTimestamp()
                    });
                    setInput("");
                } catch (e) { 
                    console.error("Analysis error:", e);
                } finally {
                    setIsAnalyzing(false);
                }
            };

            const ProgressBar = ({ label, current, goal, unit, color }) => (
                <div className="mb-4">
                    <div className="flex justify-between text-xs mb-1">
                        <span className="font-bold text-slate-600 uppercase tracking-tight">{label}</span>
                        <span className="font-medium">{current.toFixed(0)} / {goal}{unit}</span>
                    </div>
                    <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
                        <div className={`h-full transition-all duration-700 ease-out ${color}`} style={{ width: `${Math.min((current/goal)*100, 100)}%` }}></div>
                    </div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen pb-10 bg-slate-50 shadow-xl min-h-screen">
                    <header className="p-4 bg-white border-b flex justify-between items-center sticky top-0 z-10">
                        <div className="flex items-center gap-2">
                            <div className="bg-indigo-600 p-1.5 rounded-lg">
                                <Icon name="flame" className="w-5 h-5 text-white" />
                            </div>
                            <h1 className="font-black text-lg tracking-tight">HASWANTH DIET</h1>
                        </div>
                        {isSyncing ? (
                            <Icon name="loader-2" className="w-5 h-5 text-slate-400" />
                        ) : (
                            <div className="text-[10px] font-bold text-emerald-500 bg-emerald-50 px-2 py-0.5 rounded-full border border-emerald-100">CLOUD ACTIVE</div>
                        )}
                    </header>

                    <div className="p-4 space-y-6">
                        {/* Goals Card */}
                        <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                            <div className="flex items-center gap-2 mb-4 text-slate-800">
                                <Icon name="pie-chart" className="w-4 h-4" />
                                <h2 className="text-xs font-black uppercase tracking-widest">Daily Progress</h2>
                            </div>
                            <ProgressBar label="Calories" current={totals.calories} goal={GOALS.calories} unit=" kcal" color="bg-indigo-500 shadow-sm" />
                            <ProgressBar label="Protein" current={totals.protein} goal={GOALS.protein} unit="g" color="bg-emerald-500 shadow-sm" />
                        </div>

                        {/* Category Selector */}
                        <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                            {CATEGORIES.map(cat => (
                                <button 
                                    key={cat.id} 
                                    onClick={() => setSelectedCategory(cat.id)} 
                                    className={`px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap border transition-all duration-200 flex items-center gap-2 ${
                                        selectedCategory === cat.id 
                                            ? 'bg-slate-900 border-slate-900 text-white shadow-md' 
                                            : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'
                                    }`}
                                >
                                    <Icon name={cat.icon} className="w-3 h-3" />
                                    {cat.name}
                                </button>
                            ))}
                        </div>

                        {/* Input Area */}
                        <div className="relative group">
                            <textarea 
                                value={input} 
                                onChange={e => setInput(e.target.value)} 
                                placeholder="What did you eat? (e.g. 3 eggs, 100g rice)" 
                                className="w-full p-4 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 focus:outline-none min-h-[110px] text-sm shadow-sm transition-all" 
                            />
                            <button 
                                onClick={analyze} 
                                disabled={isAnalyzing || !input} 
                                className="absolute bottom-3 right-3 bg-indigo-600 text-white p-3 rounded-xl disabled:opacity-50 disabled:bg-slate-300 shadow-lg shadow-indigo-200 transition-transform active:scale-95"
                            >
                                {isAnalyzing ? <Icon name="loader-2" className="w-5 h-5" /> : <Icon name="chevron-right" className="w-5 h-5" />}
                            </button>
                        </div>

                        {/* History List */}
                        <div className="space-y-3">
                            <div className="flex items-center gap-2 mb-1">
                                <Icon name="history" className="w-4 h-4 text-slate-400" />
                                <h2 className="text-xs font-black text-slate-400 uppercase tracking-widest">Today's Logs</h2>
                            </div>
                            
                            {meals.length === 0 && !isSyncing ? (
                                <div className="text-center py-10 bg-white rounded-2xl border border-dashed border-slate-200">
                                    <Icon name="utensils" className="w-8 h-8 text-slate-200 mx-auto mb-2" />
                                    <p className="text-xs text-slate-400 font-medium">No meals recorded yet.</p>
                                </div>
                            ) : (
                                <div className="space-y-3">
                                    {meals.map(meal => (
                                        <div key={meal.id} className="bg-white p-4 rounded-2xl border border-slate-200 flex justify-between items-center hover:shadow-md transition-shadow group">
                                            <div className="flex items-center gap-3">
                                                <div className="bg-slate-50 p-2 rounded-xl group-hover:bg-indigo-50 transition-colors">
                                                    <Icon name={CATEGORIES.find(c => c.id === meal.category)?.icon || 'utensils'} className="w-4 h-4 text-slate-400 group-hover:text-indigo-500" />
                                                </div>
                                                <div>
                                                    <div className="text-sm font-bold text-slate-800">{meal.itemName}</div>
                                                    <div className="flex items-center gap-2 mt-0.5">
                                                        <span className="text-[10px] font-black text-indigo-500 uppercase tracking-tight">{meal.calories} kcal</span>
                                                        <span className="text-[10px] text-slate-300">•</span>
                                                        <span className="text-[10px] font-black text-emerald-500 uppercase tracking-tight">{meal.protein}g protein</span>
                                                        <span className="text-[10px] text-slate-300">•</span>
                                                        <span className="text-[10px] font-bold text-slate-400 uppercase tracking-tight">{meal.timestamp}</span>
                                                    </div>
                                                </div>
                                            </div>
                                            <button 
                                                onClick={async () => {
                                                    const path = `artifacts/${appId}/users/${user.uid}/meals/${meal.id}`;
                                                    await FB.deleteDoc(FB.doc(db, ...path.split('/')));
                                                }} 
                                                className="p-2 text-slate-200 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all"
                                            >
                                                <Icon name="trash-2" className="w-4 h-4" />
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
